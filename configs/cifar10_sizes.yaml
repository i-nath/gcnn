dataset:
  name: cifar10
  in_channels: 3
  num_classes: 10
  image_size: 32

training:
  optimizer:
    name: sgd
    lr: 0.05
    momentum: 0.9
    weight_decay: 0.0005
  label_smoothing: 0.0
  lr_scheduler:
    name: cosine
    t_max: null
    eta_min: 0.0

models:
  resnet:
    small:
      n_blocks: 5
      channel_dims: [16, 32, 64]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_resnet_small_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_resnet_small_best.pt
    base:
      n_blocks: 7
      channel_dims: [32, 64, 128]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_resnet_base_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_resnet_base_best.pt
    large:
      n_blocks: 10
      channel_dims: [48, 96, 192]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_resnet_large_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_resnet_large_best.pt

  p4resnet:
    small:
      n_blocks: 5
      channel_dims: [8, 16, 32]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_p4resnet_small_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_p4resnet_small_best.pt
    base:
      n_blocks: 7
      channel_dims: [16, 32, 64]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_p4resnet_base_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_p4resnet_base_best.pt
    large:
      n_blocks: 10
      channel_dims: [24, 48, 96]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_p4resnet_large_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_p4resnet_large_best.pt

  p4mresnet:
    small:
      n_blocks: 5
      channel_dims: [6, 11, 23]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_p4mresnet_small_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_p4mresnet_small_best.pt
    base:
      n_blocks: 7
      channel_dims: [11, 23, 45]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_p4mresnet_base_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_p4mresnet_base_best.pt
    large:
      n_blocks: 10
      channel_dims: [17, 34, 68]
      checkpointing:
        save_last_checkpoint: checkpoints/cifar10/cifar10_p4mresnet_large_last.pt
        save_best_checkpoint: checkpoints/cifar10/cifar10_p4mresnet_large_best.pt
